<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Assistant Pro</title>
    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338ca;
            --bg: #F9FAFB;
            --card-bg: #FFFFFF;
            --text-main: #111827;
            --text-muted: #6B7280;
            --border: #E5E7EB;
            --success: #10B981;
            --error: #EF4444;
            --warning: #F59E0B;
        }

        * { box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 900px;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            padding: 40px;
            border: 1px solid var(--border);
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin: 0 0 8px 0;
            color: var(--text-main);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 16px;
        }

        .upload-sections {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 32px;
        }

        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 32px;
            text-align: center;
            transition: all 0.2s ease;
            position: relative;
            background: #fff;
        }

        .drop-zone:hover {
            border-color: var(--primary);
            background: #F5F3FF;
        }

        .drop-zone.active {
            border-color: var(--success);
            background: #ECFDF5;
        }

        .drop-zone h3 {
            margin: 0 0 8px 0;
            font-size: 16px;
            font-weight: 600;
        }

        .drop-zone p {
            margin: 0;
            font-size: 13px;
            color: var(--text-muted);
        }

        .file-input {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; cursor: pointer;
        }

        .file-name {
            margin-top: 12px;
            font-size: 14px;
            font-weight: 500;
            color: var(--primary);
            word-break: break-all;
        }

        .preview-section {
            margin-top: 32px;
            border-top: 1px solid var(--border);
            padding-top: 24px;
            display: none;
        }

        .table-wrapper {
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin: 16px 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th {
            background: #F9FAFB;
            padding: 12px;
            text-align: left;
            position: sticky; top: 0;
            border-bottom: 1px solid var(--border);
            color: #4B5563;
            font-weight: 600;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }

        .footer-actions {
            margin-top: 32px;
            text-align: center;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn:hover:not(:disabled) {
            background: var(--primary-hover);
        }

        .btn:disabled {
            background: #D1D5DB;
            cursor: not-allowed;
        }

        .status-msg {
            margin-top: 16px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 12px;
        }
        .badge-red { background: #FEE2E2; color: #B91C1C; }
        .badge-yellow { background: #FEF3C7; color: #92400E; }
        .badge-green { background: #D1FAE5; color: #065F46; }

        @media (max-width: 600px) {
            .upload-sections { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Stock Assistant Pro</h1>
            <p class="subtitle">Update template with warehouse stock and 10-7 Law rules</p>
        </header>

        <div class="upload-sections">
            <div class="drop-zone" id="zone1">
                <h3>1. Today's Stock</h3>
                <p>Upload Excel with SKUs and Availability</p>
                <div id="file1Name" class="file-name"></div>
                <input type="file" id="file1" class="file-input" accept=".xlsx,.xls">
            </div>

            <div class="drop-zone" id="zone2">
                <h3>2. Template (Yesterday's)</h3>
                <p>Upload the file to be updated</p>
                <div id="file2Name" class="file-name"></div>
                <input type="file" id="file2" class="file-input" accept=".xlsx,.xls">
            </div>
        </div>

        <div class="preview-section" id="previewContainer">
            <h2 style="font-size: 18px;">Data Preview</h2>
            <div class="table-wrapper">
                <table id="previewTable">
                    <thead>
                        <tr>
                            <th>SKU</th>
                            <th>Stock</th>
                            <th>Warehouse</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div class="footer-actions">
            <button id="exportBtn" class="btn" disabled>Process & Export Excel</button>
            <div id="status" class="status-msg">Upload both files to begin</div>
        </div>
    </div>

    <script>
        let state = {
            todayData: {}, // SKU -> {stock: number, wh: string}
            templateBuffer: null,
            templateName: ""
        };

        const els = {
            file1: document.getElementById('file1'),
            file2: document.getElementById('file2'),
            file1Name: document.getElementById('file1Name'),
            file2Name: document.getElementById('file2Name'),
            zone1: document.getElementById('zone1'),
            zone2: document.getElementById('zone2'),
            exportBtn: document.getElementById('exportBtn'),
            status: document.getElementById('status'),
            previewContainer: document.getElementById('previewContainer'),
            previewTable: document.querySelector('#previewTable tbody')
        };

        const normalize = (val) => val ? String(val).trim().toUpperCase() : "";

        // File 1: Today's Stock
        els.file1.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            els.file1Name.textContent = file.name;
            els.zone1.classList.add('active');
            els.status.textContent = "Processing Today's Stock...";

            const reader = new FileReader();
            reader.onload = (event) => {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(sheet, { defval: "" });

                if (rows.length > 0) {
                    const keys = Object.keys(rows[0]);
                    const skuKey = keys.find(k => normalize(k).includes("SKU"));
                    const stockKey = keys.find(k => {
                        const n = normalize(k);
                        return n.includes("AVAIL") || n.includes("STOCK") || n.includes("QTY") || n.includes("VOL");
                    });
                    const whKey = keys.find(k => normalize(k).includes("WAREHOUSE") || normalize(k).includes("WH"));

                    const map = {};
                    rows.forEach(row => {
                        const sku = normalize(row[skuKey]);
                        const stock = parseInt(row[stockKey], 10);
                        const wh = whKey ? String(row[whKey]).trim() : "Unknown";

                        if (sku && !isNaN(stock)) {
                            // Warehouse Logic: Keep MAX stock for a SKU if multiple warehouses exist
                            if (map[sku] === undefined || stock > map[sku].stock) {
                                map[sku] = { stock, wh };
                            }
                        }
                    });
                    state.todayData = map;
                    els.status.textContent = `Loaded ${Object.keys(map).length} unique SKUs.`;
                    checkReady();
                    renderPreview();
                }
            };
            reader.readAsArrayBuffer(file);
        });

        // File 2: Template
        els.file2.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            els.file2Name.textContent = file.name;
            els.zone2.classList.add('active');
            state.templateName = file.name;

            const reader = new FileReader();
            reader.onload = (event) => {
                state.templateBuffer = event.target.result;
                checkReady();
            };
            reader.readAsArrayBuffer(file);
        });

        function checkReady() {
            if (Object.keys(state.todayData).length > 0 && state.templateBuffer) {
                els.exportBtn.disabled = false;
                els.status.textContent = "Files ready. Click export to process.";
            }
        }

        function renderPreview() {
            els.previewContainer.style.display = 'block';
            els.previewTable.innerHTML = "";
            const skus = Object.keys(state.todayData).slice(0, 50); // Preview first 50
            skus.forEach(sku => {
                const item = state.todayData[sku];
                const tr = document.createElement('tr');
                let badge = "";
                if (item.stock <= 7) badge = '<span class="badge badge-red">Low (<=7)</span>';
                else if (item.stock <= 10) badge = '<span class="badge badge-yellow">Mid (8-10)</span>';
                else badge = '<span class="badge badge-green">Good (>10)</span>';

                tr.innerHTML = `<td>${sku}</td><td>${item.stock}</td><td>${item.wh}</td><td>${badge}</td>`;
                els.previewTable.appendChild(tr);
            });
        }

        // Export with 10-7 Law and Warehouse Logic
        els.exportBtn.addEventListener('click', async () => {
            try {
                els.status.textContent = "Processing Excel...";
                els.exportBtn.disabled = true;

                const workbook = new ExcelJS.Workbook();
                await workbook.xlsx.load(state.templateBuffer);
                const worksheet = workbook.getWorksheet(1);

                // Find Columns in Template
                let skuCol = -1, stockCol = -1, whCol = -1;
                worksheet.getRow(1).eachCell((cell, colNum) => {
                    const v = normalize(cell.value);
                    if (v.includes("SKU")) skuCol = colNum;
                    if (v.includes("AVAIL") || v.includes("STOCK") || v.includes("QTY")) stockCol = colNum;
                    if (v.includes("WH") || v.includes("WAREHOUSE")) whCol = colNum;
                });

                // Fallback: SKU is usually A (1), Stock is B (2) if not found
                if (skuCol === -1) skuCol = 1;
                if (stockCol === -1) stockCol = 2;

                worksheet.eachRow((row, rowNumber) => {
                    if (rowNumber === 1) return; // Skip header

                    const skuValue = normalize(row.getCell(skuCol).value);
                    if (skuValue && state.todayData[skuValue]) {
                        const match = state.todayData[skuValue];
                        const stockCell = row.getCell(stockCol);

                        // Update Stock
                        stockCell.value = match.stock;
                        stockCell.numberFormat = '0';

                        // Implement 10-7 Law
                        let color = 'FFD1FAE5'; // Default Green (Light)
                        let textColor = 'FF065F46';
                        
                        if (match.stock <= 7) {
                            color = 'FFFEE2E2'; // Red
                            textColor = 'FFB91C1C';
                        } else if (match.stock <= 10) {
                            color = 'FFFEF3C7'; // Yellow
                            textColor = 'FF92400E';
                        }

                        stockCell.fill = {
                            type: 'pattern',
                            pattern: 'solid',
                            fgColor: { argb: color }
                        };
                        stockCell.font = {
                            color: { argb: textColor },
                            bold: true
                        };

                        // Warehouse Function: Update if template has WH column
                        if (whCol !== -1) {
                            row.getCell(whCol).value = match.wh;
                        }
                    }
                });

                // Write and Save
                const buffer = await workbook.xlsx.writeBuffer();
                const blob = new Blob([buffer], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
                saveAs(blob, "Update_Stock_" + state.templateName);

                els.status.textContent = "Done! File downloaded.";
                els.exportBtn.disabled = false;

            } catch (err) {
                console.error(err);
                alert("Error processing Excel: " + err.message);
                els.exportBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
